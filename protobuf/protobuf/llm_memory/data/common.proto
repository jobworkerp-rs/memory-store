syntax = "proto3";

package llm_memory.data;

// Unique identifier for a user. Identifies the owner of a memory or
// system prompt.
message UserId {
    int64 value = 1;
}

// Content type of a memory record. Distinguishes the format of the
// stored payload.
enum ContentType {
  TEXT = 0;   // Text message (default)
  TOOL = 1;   // Tool / function-call result
  IMAGE = 2;  // Reference to image data
  AUDIO = 3;  // Reference to audio data
  VIDEO = 4;  // Reference to video data
  URL = 5;    // URL reference
}

// Role of the message sender. Mirrors AG-UI Message.role.
enum MessageRole {
  ROLE_UNSPECIFIED = 0;  // Unspecified (default, for backward compatibility)
  ROLE_USER = 1;         // Message from the end user
  ROLE_ASSISTANT = 2;    // Response from the assistant (LLM)
  // System message. Register via `MemoryService.Create` with
  // `role = ROLE_SYSTEM` and `parent_ids = []`, then wire the resulting
  // MemoryId into a conversation either by setting it as the target
  // Thread's `default_system_memory_id` or by including it in
  // `parent_ids` on AddMemory.
  ROLE_SYSTEM = 3;
  ROLE_TOOL = 4;         // Tool execution result
  ROLE_META = 5;         // Runtime meta-event (e.g. Claude Code compact_boundary, turn_duration)
  // Self-reflection memory generated by thread-reflection workflow.
  // Stored under reflection_user_id (=300000) and attached only to the
  // aggregate reflection thread. Its search document is embedded by the
  // generic MemoryVectorService text path; reflection-specific intent
  // vectors stay in reflection_intent_vector.
  ROLE_REFLECTION = 6;
}

// Label match mode for thread label filtering
enum LabelMatchMode {
    // Match threads that have ANY of the specified labels (default)
    LABEL_ANY = 0;
    // Match threads that have ALL of the specified labels
    LABEL_ALL = 1;
}

// Sort key for MemoryService.FindListByCondition.
// UNSPECIFIED (= 0) is interpreted as MEMORY_LIST_SORT_UPDATED_DESC (default).
enum MemoryListSort {
    MEMORY_LIST_SORT_UNSPECIFIED  = 0;
    MEMORY_LIST_SORT_UPDATED_DESC = 1;
    MEMORY_LIST_SORT_UPDATED_ASC  = 2;
    MEMORY_LIST_SORT_CREATED_DESC = 3;
    MEMORY_LIST_SORT_CREATED_ASC  = 4;
    MEMORY_LIST_SORT_ID_DESC      = 5;
}

// Sort key for ThreadService.FindThreadListByUserId / FindThreadListByLabels.
// UNSPECIFIED (= 0) maps to UPDATED_DESC (default).
enum ThreadListSort {
    THREAD_LIST_SORT_UNSPECIFIED  = 0;
    THREAD_LIST_SORT_UPDATED_DESC = 1;
    THREAD_LIST_SORT_UPDATED_ASC  = 2;
    THREAD_LIST_SORT_CREATED_DESC = 3;
    THREAD_LIST_SORT_CREATED_ASC  = 4;
    THREAD_LIST_SORT_ID_DESC      = 5;
}
