name: Publish Image

# Triggered on the public GitHub repository when a release tag is pushed
# (the internal gitea `publish-public.yml` mirrors the tree and pushes the
# tag here). Runs the full test suite (SQLite + PostgreSQL) as a gate, then
# builds the memories gRPC server image from Dockerfile and publishes it to
# GitHub Container Registry (ghcr.io).
#
# This is the primary place tests run for the public repository: the
# PR-triggered ci.yaml only fires on external pull requests, so the normal
# tag-sync flow relies on the jobs here. The image is published only if both
# test jobs pass, and their results are visible on the Actions run for the
# release tag — so consumers can see each published image was built from a
# tested commit. Tests run exactly once here (ci.yaml does not fire on tag
# pushes), so there is no duplicate run or flaky double-gating.
#
# Jobs run directly on the runner host (no `container:`), so service
# containers are reachable only via 127.0.0.1 + a mapped port, not by the
# service name — hence the explicit `ports:` and 127.0.0.1 TEST_* URLs.

on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-sqlite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Remove large packages
        run: |
          sudo rm -rf /opt/hostedtoolcache || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev protobuf-compiler
      - name: Clean up apt cache
        run: |
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-sqlite-${{ hashFiles('**/Cargo.lock') }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Run test (SQLite)
        run: cargo test -- --test-threads=1
        env:
          TEST_REDIS_URL: "redis://127.0.0.1:6379"
          RUST_BACKTRACE: 1

  test-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Remove large packages
        run: |
          sudo rm -rf /opt/hostedtoolcache || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev protobuf-compiler
      - name: Clean up apt cache
        run: |
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-postgres-${{ hashFiles('**/Cargo.lock') }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Run test (PostgreSQL)
        run: cargo test --features postgres -- --test-threads=1
        env:
          TEST_POSTGRES_URL: "postgres://postgres:postgres@127.0.0.1:5432/test"
          TEST_REDIS_URL: "redis://127.0.0.1:6379"
          RUST_BACKTRACE: 1

  build-and-publish:
    needs: [test-sqlite, test-postgres]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push memories-grpc Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
