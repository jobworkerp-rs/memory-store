document:
  dsl: "1.0.0-jobworkerp"
  namespace: memories
  name: daily-work-summary-batch
  version: "1.0.0"

# Generates daily-work-summary-single for a date range. Use this for
# back-fills or manual re-runs over multiple days. Cron-style daily
# execution should call daily-work-summary-single directly with no
# `target_date` (defaults to "yesterday").

input:
  schema:
    document:
      type: object
      properties:
        source_user_id: { type: integer, default: 100000 }
        memories_grpc_host: { type: string, default: "localhost" }
        memories_grpc_port: { type: integer, default: 9100 }
        memories_grpc_tls: { type: boolean, default: false }
        llm_worker_name: { type: string, default: "memories-llm" }
        start_date:
          type: string
          default: ""
          description: >-
            YYYY-MM-DD or empty. Empty = use last_n_days (or fall
            back to "yesterday only"). When non-empty, end_date must
            also be set; (start, end) wins over last_n_days.
        end_date:
          type: string
          default: ""
          description: Inclusive end date (YYYY-MM-DD) or empty.
        last_n_days:
          type: integer
          default: 0
          description: >-
            Last N days ending yesterday (in tz). 0 = unused (falls
            back to start/end or "yesterday only").
        timezone_offset_hours: { type: integer, minimum: 0, maximum: 23, default: 9 }
        summary_label: { type: string, default: "summary" }
        daily_label: { type: string, default: "daily_summary" }
        extra_labels_filter:
          type: array
          items: { type: string }
          default: []
        min_thread_count: { type: integer, default: 1 }
        max_context_chars: { type: integer, default: 200000 }
        summary_model: { type: string, default: "qwen3.6:27b" }
        ollama_base_url: { type: string, default: "http://localhost:11434" }
        output_language: { type: string, enum: ["ja", "en"], default: "ja" }
        force_resummarize: { type: boolean, default: false }

timeout:
  after:
    hours: 24

do:
  # Step 1: Resolve the date list. Modes (in priority order):
  #   range:       (start_date, end_date) inclusive
  #   last-N:      last_n_days days ending yesterday
  #   fallback:    [yesterday] only
  # See daily-work-summary-single.yaml resolveTargetDate for the TZ
  # handling rationale (jq strftime is UTC-only).
  - resolveYesterdayEpoch:
      set:
        yesterday_epoch: >-
          ${ now + ($workflow.input.timezone_offset_hours * 3600) - 86400 }

  - resolveDateRange:
      set:
        date_list: >-
          ${ if $workflow.input.start_date != ""
                and $workflow.input.end_date != ""
             then
               # Range mode. Convert both ends to epoch, step by day.
               ((($workflow.input.start_date + "T00:00:00Z")
                 | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime) as $s
                | (($workflow.input.end_date + "T00:00:00Z")
                   | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime) as $e
                | [range($s; $e + 1; 86400)]
                | map(strftime("%Y-%m-%d")))
             elif $workflow.input.last_n_days > 0
             then
               ([range(0; $workflow.input.last_n_days)]
                | map(($yesterday_epoch - (. * 86400))
                      | strftime("%Y-%m-%d"))
                | reverse)
             else
               [$yesterday_epoch | strftime("%Y-%m-%d")]
             end }

  # Step 1.5: Initialize accumulators so the for-loop below can append
  # to them and the output block can reference them even when zero
  # iterations ran.
  - initOutcomeAccumulators:
      set:
        succeeded_dates: "${ [] }"
        failed_dates: "${ [] }"
        last_error: "${ null }"

  # Step 2: For each date, dispatch daily-work-summary-single. Failures
  # in one day must not abort the rest of the range — a missing day is
  # less bad than dropping the days after it. Per-day outcome is
  # accumulated so the caller can re-run only the failed days.
  - summarizeEachDay:
      timeout:
        after:
          hours: 24
      for:
        each: target_date
        in: "${ $date_list }"
      onError: continue
      do:
        - invokeSingleWithRetry:
            try:
              - invokeSingle:
                  timeout:
                    after:
                      minutes: 120
                  run:
                    function:
                      workerName: '${ "memories-daily-work-summary-single-" + $workflow.input.output_language }'
                      arguments:
                        input: >-
                          ${ {
                            source_user_id: $workflow.input.source_user_id,
                            target_date: $target_date,
                            timezone_offset_hours: $workflow.input.timezone_offset_hours,
                            memories_grpc_host: $workflow.input.memories_grpc_host,
                            memories_grpc_port: $workflow.input.memories_grpc_port,
                            memories_grpc_tls: $workflow.input.memories_grpc_tls,
                            llm_worker_name: $workflow.input.llm_worker_name,


                            summary_label: $workflow.input.summary_label,
                            daily_label: $workflow.input.daily_label,
                            extra_labels_filter: $workflow.input.extra_labels_filter,
                            min_thread_count: $workflow.input.min_thread_count,
                            max_context_chars: $workflow.input.max_context_chars,
                            summary_model: $workflow.input.summary_model,
                            ollama_base_url: $workflow.input.ollama_base_url,
                            output_language: $workflow.input.output_language,
                            force_resummarize: $workflow.input.force_resummarize
                          } | tojson }
              - recordSuccess:
                  set:
                    succeeded_dates: "${ $succeeded_dates + [$target_date] }"
            catch:
              as: error
              do:
                - recordFailure:
                    set:
                      failed_dates: "${ $failed_dates + [$target_date] }"
                      last_error: "${ $error }"

output:
  as:
    # `completed` reflects "all attempted dates succeeded".
    # When false, inspect `failed_dates` to know what to re-run.
    completed: ${ ($failed_dates | length) == 0 }
    processed_dates: ${ $date_list | length }
    succeeded_count: ${ $succeeded_dates | length }
    failed_count: ${ $failed_dates | length }
    dates: ${ $date_list }
    succeeded_dates: ${ $succeeded_dates }
    failed_dates: ${ $failed_dates }
    last_error: ${ $last_error }
