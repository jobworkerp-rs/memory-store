document:
  dsl: "1.0.0-jobworkerp"
  namespace: memories
  name: monthly-work-summary-single
  version: "1.0.0"

# Aggregates per-week summaries (produced by weekly-work-summary-single)
# for one calendar month into a single "monthly work summary" memory.
#
# Input is the set of memories owned by `source_user_id` carrying the
# `weekly_label` marker AND whose memory.updated_at falls within
# [month_start, month_end) (1st 00:00 local — next-month-1st 00:00
# local). Output is one memory under a monthly_summary thread keyed by
# `external_id = "monthly:<YYYY-MM>:<scope_key>"` so re-runs are
# idempotent.
#
# Note on month-straddling ISO weeks: a weekly memory's updated_at is
# `max(daily.updated_at)` across its week, so a week straddling two
# calendar months is attributed to the month containing its latest
# daily activity. Monthly aggregates therefore reflect "weeks that
# closed within this month". Document this in callers' README.

input:
  schema:
    document:
      type: object
      required: []
      properties:
        source_user_id:
          type: integer
          default: 100000
          description: Owner of per-week summaries (the summary-agent user).
        target_month:
          type: string
          default: ""
          description: >-
            Calendar month token "YYYY-MM" (zero-padded). Empty =
            "last completed month" in the configured tz.
        timezone_offset_hours:
          type: integer
          minimum: 0
          maximum: 23
          default: 9
          description: >-
            Fallback fixed offset from UTC for the month boundary (0-23),
            used only when the worker's TZ env var is unset. JST (+9) by
            default; negative/DST offsets unsupported. Set the jobworkerp
            worker's TZ (e.g. TZ=Asia/Tokyo) for DST-aware boundaries.
        memories_grpc_host: { type: string, default: "localhost" }
        memories_grpc_port: { type: integer, default: 9100 }
        memories_grpc_tls: { type: boolean, default: false }
        llm_worker_name: { type: string, default: "memories-llm" }
        weekly_label:
          type: string
          default: "weekly_summary"
          description: >-
            Marker label of per-week summary threads (set by
            weekly-work-summary-single). Threads with this label are
            the input to this workflow.
        monthly_label:
          type: string
          default: "monthly_summary"
          description: >-
            Marker label written on the monthly aggregate thread.
        extra_labels_filter:
          type: array
          items: { type: string }
          default: []
          description: >-
            Additional labels AND-matched against the per-week summary
            listing. Empty (default) = aggregate across all projects.
        min_thread_count:
          type: integer
          default: 1
          description: >-
            Skip when fewer than N weekly summary memories matched the
            month window. Counts source *memories*, not threads.
        max_context_chars:
          type: integer
          default: 200000
          description: >-
            Hard cap on combined per-week summary text. Weekly
            summaries are already ordered by updated_at desc; trailing
            entries are truncated when the cap is exceeded.
        summary_model: { type: string, default: "qwen3.6:27b" }
        ollama_base_url: { type: string, default: "http://localhost:11434" }
        output_language: { type: string, enum: ["ja", "en"], default: "ja" }
        force_resummarize: { type: boolean, default: false }

do:
  # Step 0: Initialize variables referenced by `output.as` so early
  # `then: exit` paths do not crash on undefined variables.
  - initOutputVars:
      set:
        summary_json: "${ null }"
        skipped: "${ false }"
        result: "${ null }"
        target_month_resolved: "${ null }"
        target_memories: "${ [] }"

  # Step 0.5: Expose the fallback fixed offset (seconds). The TZ-vs-offset
  # choice is read inline via `env.TZ` per expression (see
  # daily-work-summary-single for the rationale).
  - normalizeTimezone:
      set:
        tz_offset_seconds: "${ $workflow.input.timezone_offset_hours * 3600 }"

  # Step 1: Resolve target_month.
  # When empty, "last completed month" = this month's 1st 00:00 local
  # minus 1 second, formatted with %Y-%m. Offset path shifts `now` by
  # tz_offset before the UTC-as-if strftime/mktime; TZ path renders the
  # local 1st via strflocaltime, converts to a DST-aware UTC epoch with
  # the localtime offset correction, backs up one second, and reformats.
  - resolveTargetMonth:
      set:
        target_month_resolved: >-
          ${ if $workflow.input.target_month != ""
             then $workflow.input.target_month
             elif (env.TZ // "") != ""
             then (((now | strflocaltime("%Y-%m-01T00:00:00"))
                    | strptime("%Y-%m-%dT%H:%M:%S") | mktime) as $e
                   | ($e | localtime | mktime) as $b
                   | (($e - ($b - $e)) - 1 | strflocaltime("%Y-%m")))
             else ((((now + $tz_offset_seconds)
                     | strftime("%Y-%m-01T00:00:00Z"))
                    | strptime("%Y-%m-%dT%H:%M:%SZ")
                    | mktime) - 1
                   | strftime("%Y-%m"))
             end }

  # Step 2: Compute month_start_ms (1st 00:00 in local tz). Offset path
  # subtracts tz_offset from UTC-as-if mktime; TZ path applies the
  # localtime offset correction to the local "<month>-01 00:00".
  - computeMonthStart:
      set:
        month_start_ms: >-
          ${ (if (env.TZ // "") != ""
              then (($target_month_resolved + "-01T00:00:00")
                    | strptime("%Y-%m-%dT%H:%M:%S") | mktime) as $e
                   | ($e | localtime | mktime) as $b
                   | ($e - ($b - $e))
              else ((($target_month_resolved + "-01T00:00:00Z")
                     | strptime("%Y-%m-%dT%H:%M:%SZ")
                     | mktime) - $tz_offset_seconds)
              end) * 1000 }

  # Step 2b: Compute next-month token via string math, then re-parse
  # for month_end_ms. This sidesteps DOM overflow / leap-year traps
  # that broken-down arithmetic would hit.
  - computeMonthEnd:
      set:
        month_token_parts: "${ $target_month_resolved | split(\"-\") }"

  - computeNextMonthToken:
      set:
        next_month_year: >-
          ${ ($month_token_parts[0] | tonumber) as $y
             | ($month_token_parts[1] | tonumber) as $m
             | (if $m == 12 then $y + 1 else $y end) }
        next_month_num: >-
          ${ ($month_token_parts[1] | tonumber) as $m
             | (if $m == 12 then 1 else $m + 1 end) }

  - composeNextMonthToken:
      set:
        next_month_token: >-
          ${ ($next_month_year | tostring) + "-"
             + ($next_month_num | tostring
                | if length == 1 then "0" + . else . end) }

  - computeMonthEndMs:
      set:
        month_end_ms: >-
          ${ (if (env.TZ // "") != ""
              then (($next_month_token + "-01T00:00:00")
                    | strptime("%Y-%m-%dT%H:%M:%S") | mktime) as $e
                   | ($e | localtime | mktime) as $b
                   | ($e - ($b - $e))
              else ((($next_month_token + "-01T00:00:00Z")
                     | strptime("%Y-%m-%dT%H:%M:%SZ")
                     | mktime) - $tz_offset_seconds)
              end) * 1000 }

  # Step 3: Alias for readability. Schema-injected default is 100000.
  - normalizeSourceUserId:
      set:
        effective_source_user_id: "${ $workflow.input.source_user_id }"

  # Step 3a: Derive scope_key from extra_labels_filter. memory.external_id
  # is UNIQUE DB-wide, so distinct filter sets must produce distinct
  # external_ids; sort+join makes the key order-independent.
  - deriveScopeKey:
      set:
        sorted_extra_labels: "${ $workflow.input.extra_labels_filter | sort }"
        scope_key: >-
          ${ if ($workflow.input.extra_labels_filter | length) == 0
             then "_all"
             else ($workflow.input.extra_labels_filter | sort | join(","))
             end }

  # Step 3b: Compose external_id. Split from deriveScopeKey because
  # jaq evaluates `set` keys in parallel — same-block references would
  # see undefined.
  - composeMonthlyExternalId:
      set:
        monthly_external_id: >-
          ${ "monthly:" + $target_month_resolved + ":" + $scope_key }
        monthly_thread_labels: >-
          ${ [$workflow.input.monthly_label,
              "month:" + $target_month_resolved,
              "scope:" + $scope_key]
             + $sorted_extra_labels }

  # Step 4: Fetch weekly summary memories in the month window.
  # Filter on memories (not threads) for the same reason as weekly:
  # ThreadService.AddMemory bumps the parent thread's updated_at,
  # so a thread filter would surface old conversations whose summary
  # was just written.
  - fetchWeeklyMemories:
      run:
        function:
          runnerName: GRPC
          using: streaming
          settings:
            host: "${$workflow.input.memories_grpc_host}"
            port: ${$workflow.input.memories_grpc_port}
            tls: ${$workflow.input.memories_grpc_tls}
            useReflection: true
          arguments:
            method: "/llm_memory.service.MemoryService/FindListByCondition"
            json_body: >-
              ${ {
                roles: ["ROLE_ASSISTANT"],
                user_id: { value: $effective_source_user_id },
                external_id_prefix: "weekly:",
                # API: updated_after is strict (>), updated_before is
                # inclusive (<=). To express the half-open interval
                # [month_start_ms, month_end_ms): pass start-1 (>=)
                # and end-1 (< end).
                updated_after: ($month_start_ms - 1),
                updated_before: ($month_end_ms - 1),
                content_types: ["TEXT"],
                thread_filter: {
                  user_id: $effective_source_user_id,
                  labels: ([$workflow.input.weekly_label]
                           + $sorted_extra_labels),
                  label_match_mode: "LABEL_ALL"
                }
              } | tojson }
            as_json: true
      export:
        as:
          target_memories: ${ .jsonBody | fromjson }

  # Step 5: Skip if too few source weekly summary memories.
  - checkMemoryCount:
      if: "${ ($target_memories | length) < $workflow.input.min_thread_count }"
      set:
        skipped: true
      export:
        as:
          result: "skipped: not enough source summary memories for the month"
      then: exit

  # Step 6: Build LLM input. Each MemoryListEntry carries:
  #   - memory.data.content   = weekly-summary's structured JSON string
  #     ({overall_purpose, purpose_groups, by_topic, trends, carryover})
  #   - thread_description    = "<YYYY-Www> — <overall_purpose>" written
  #     back to the weekly aggregate thread by weekly-work-summary
  #     Step 14.
  #   - thread_id             = weekly aggregate thread id.
  - buildContext:
      set:
        truncated_entries: >-
          ${ ($target_memories | map(.memory.data.content // "" | length) | add // 0) as $total
             | if $total > $workflow.input.max_context_chars
               then
                 ($target_memories | reduce .[] as $e (
                    {acc: [], used: 0};
                    if .used + ($e.memory.data.content // "" | length)
                       <= $workflow.input.max_context_chars
                    then {acc: (.acc + [$e]),
                          used: (.used + ($e.memory.data.content // "" | length))}
                    else .
                    end
                  )).acc
               else $target_memories
               end }

  # Step 8: Search for an existing monthly summary thread for this month
  # AND scope.
  - findMonthlyThread:
      run:
        function:
          runnerName: GRPC
          using: streaming
          settings:
            host: "${$workflow.input.memories_grpc_host}"
            port: ${$workflow.input.memories_grpc_port}
            tls: ${$workflow.input.memories_grpc_tls}
            useReflection: true
          arguments:
            method: "/llm_memory.service.ThreadService/FindThreadListByLabels"
            json_body: >-
              ${ {
                labels: [$workflow.input.monthly_label,
                         "month:" + $target_month_resolved,
                         "scope:" + $scope_key],
                match_mode: "LABEL_ALL",
                user_id: $effective_source_user_id,
                limit: 1
              } | tojson }
            as_json: true
      export:
        as:
          existing_monthly_thread_id: >-
            ${ ((.jsonBody // "[]") | fromjson)
               | (if length > 0 then .[0].id.value else null end) }
          existing_monthly_thread_data: >-
            ${ ((.jsonBody // "[]") | fromjson)
               | (if length > 0 then .[0].data else null end) }

  # Step 8.5: Default for existing_monthly_memory.
  - initExistingMonthlyMemory:
      set:
        existing_monthly_memory: "${ null }"

  # Step 9: Look up the existing monthly memory inside that thread,
  # keyed by external_id = "monthly:<YYYY-MM>:<scope_key>".
  - findExistingMonthlyMemory:
      if: "${ $existing_monthly_thread_id != null }"
      run:
        function:
          runnerName: GRPC
          using: streaming
          settings:
            host: "${$workflow.input.memories_grpc_host}"
            port: ${$workflow.input.memories_grpc_port}
            tls: ${$workflow.input.memories_grpc_tls}
            useReflection: true
          arguments:
            method: "/llm_memory.service.ThreadService/FindMemoriesByThreadId"
            json_body: >-
              ${ {
                thread_id: { value: $existing_monthly_thread_id },
                roles: ["ROLE_ASSISTANT"],
                content_types: ["TEXT"]
              } | tojson }
            as_json: true
      export:
        as:
          existing_monthly_memory: >-
            ${ ((.jsonBody // "[]") | fromjson)
               | map(select(.data.externalId == $monthly_external_id))
               | (if length > 0 then .[0] else null end) }

  # Step 10: Eligibility — skip when an up-to-date monthly summary
  # already exists. Split into two setTasks because jaq's `set`
  # evaluates keys in parallel, so `eligible` cannot reference
  # `$max_source_updated_at` defined in the same block.
  - computeMaxSourceUpdatedAt:
      set:
        max_source_updated_at: >-
          ${ $target_memories | map(.memory.data.updatedAt) | max // 0 }

  - checkEligibility:
      set:
        eligible: >-
          ${ $workflow.input.force_resummarize
             or ($existing_monthly_memory == null)
             or ($existing_monthly_memory.data.updatedAt < $max_source_updated_at) }

  - skipIfNotEligible:
      if: "${ $eligible | not }"
      set:
        skipped: true
      export:
        as:
          result: "skipped: monthly summary already up to date"
      then: exit

  # Step 11: Generate the monthly aggregate via LLM. The system prompt
  # adds month-level highlights and milestones on top of weekly trend
  # detection, which is the value-add of this layer.
  - validateMonthlyWorkSummaryPromptContext:
      if: "${ (($monthly_work_summary_system_prompt // \"\") | length) == 0 or (($monthly_work_summary_user_tail // \"\") | length) == 0 }"
      raise:
        error:
          type: "https://memories.local/errors/monthly-work-summary/prompt_context_missing"
          status: 422
          title: "Monthly work summary prompt context is missing"
          detail: >-
            ${ if (($monthly_work_summary_system_prompt // "") | length) == 0
               then "monthly_work_summary_system_prompt is missing"
               else "monthly_work_summary_user_tail is missing"
               end }

  - generateMonthlySummary:
      run:
        function:
          runnerName: LLM
          using: completion
          settings:
            ollama:
              base_url: "${$workflow.input.ollama_base_url}"
              model: "${$workflow.input.summary_model}"
          options:
            channel: llm
            storeSuccess: false
            storeFailure: true
          arguments:
            system_prompt: "${ $monthly_work_summary_system_prompt }"
            prompt: >-
              $${## Target month
              {{ target_month_resolved }}

              ## Monthly weekly summaries ({{ truncated_entries | size }} entries / {{ target_memories | size }} source entries)

              {% for e in truncated_entries %}
              ---
              memory_id: {{ e.memory.id.value }}
              thread_id: {{ e.threadId.value }}
              thread_description: {{ e.threadDescription }}
              memory_updated_at: {{ e.memory.data.updatedAt }}
              summary_json: {{ e.memory.data.content }}
              {% endfor %}

              {{ monthly_work_summary_user_tail }}}
            options:
              max_tokens: 8000
              temperature: 0.3
            json_schema: |
              {
                "type": "object",
                "required": ["overall_purpose", "purpose_groups", "by_topic", "highlights", "milestones", "carryover"],
                "properties": {
                  "overall_purpose": { "type": "string" },
                  "purpose_groups": {
                    "type": "array",
                    "items": {
                      "type": "object",
                      "required": ["purpose", "bullets", "source_memory_ids", "status"],
                      "properties": {
                        "purpose": { "type": "string" },
                        "bullets": { "type": "array", "items": { "type": "string" } },
                        "source_memory_ids": { "type": "array", "items": { "type": "string" } },
                        "status": { "type": "string", "enum": ["resolved", "ongoing", "in_review", "blocked", "deferred", "abandoned"] }
                      }
                    }
                  },
                  "by_topic": {
                    "type": "array",
                    "items": {
                      "type": "object",
                      "required": ["topic", "bullets"],
                      "properties": {
                        "topic": { "type": "string" },
                        "bullets": { "type": "array", "items": { "type": "string" } }
                      }
                    }
                  },
                  "highlights": {
                    "type": "array",
                    "maxItems": 5,
                    "items": {
                      "type": "object",
                      "required": ["title", "summary"],
                      "properties": {
                        "title": { "type": "string" },
                        "summary": { "type": "string" },
                        "source_memory_ids": { "type": "array", "items": { "type": "string" } }
                      }
                    }
                  },
                  "milestones": {
                    "type": "array",
                    "items": {
                      "type": "object",
                      "required": ["title", "outcome"],
                      "properties": {
                        "title": { "type": "string" },
                        "outcome": { "type": "string" },
                        "completed_in_week": { "type": "string" },
                        "source_memory_ids": { "type": "array", "items": { "type": "string" } }
                      }
                    }
                  },
                  "carryover": { "type": "array", "items": { "type": "string" } }
                }
              }
      export:
        as:
          summary_json: ${ .content.text | fromjson }

  # Step 11.5: Default for created_monthly_thread_id.
  - initCreatedMonthlyThreadId:
      set:
        created_monthly_thread_id: "${ null }"

  # Step 12: Create the monthly aggregate thread when missing.
  - createMonthlyThread:
      if: "${ $existing_monthly_thread_id == null }"
      run:
        function:
          runnerName: GRPC
          using: unary
          settings:
            host: "${$workflow.input.memories_grpc_host}"
            port: ${$workflow.input.memories_grpc_port}
            tls: ${$workflow.input.memories_grpc_tls}
            useReflection: true
          arguments:
            method: "/llm_memory.service.ThreadService/Create"
            json_body: >-
              ${ {
                user_id: { value: $effective_source_user_id },
                description: ($target_month_resolved + " の作業要約 ("
                              + ($target_memories | length | tostring)
                              + " 週次)"),
                labels: $monthly_thread_labels,
                created_at: $month_start_ms,
                updated_at: $max_source_updated_at
              } | tojson }
            as_json: true
      export:
        as:
          created_monthly_thread_id: ${ .jsonBody | fromjson | .id.value }

  - resolveMonthlyThreadId:
      set:
        monthly_thread_id: "${ $existing_monthly_thread_id // $created_monthly_thread_id }"
        monthly_metadata_json: >-
          ${ {
              month: $target_month_resolved,
              scope: $scope_key,
              extra_labels: $sorted_extra_labels,
              source_memory_count: ($target_memories | length),
              source_memory_ids: ($target_memories
                | map(.memory.id.value | tostring)),
              source_thread_ids: ($target_memories
                | map(.threadId.value | tostring) | unique),
              summary_version: "1.0"
            } | tojson }

  # Step 13-a: Update existing monthly memory in place (preserves
  # external_id UNIQUE invariant on re-summarize).
  - updateMonthlyMemory:
      if: "${ $existing_monthly_memory != null }"
      run:
        function:
          runnerName: GRPC
          using: unary
          settings:
            host: "${$workflow.input.memories_grpc_host}"
            port: ${$workflow.input.memories_grpc_port}
            tls: ${$workflow.input.memories_grpc_tls}
            useReflection: true
          arguments:
            method: "/llm_memory.service.MemoryService/Update"
            json_body: >-
              ${ {
                id: $existing_monthly_memory.id,
                data: ($existing_monthly_memory.data
                  | .content = ($summary_json | tojson)
                  | .metadata = $monthly_metadata_json
                  | .externalId = $monthly_external_id
                  | .updatedAt = $max_source_updated_at)
              } | tojson }
            as_json: true

  # Step 13-b: Add new monthly memory.
  - addMonthlyMemory:
      if: "${ $existing_monthly_memory == null }"
      run:
        function:
          runnerName: GRPC
          using: unary
          settings:
            host: "${$workflow.input.memories_grpc_host}"
            port: ${$workflow.input.memories_grpc_port}
            tls: ${$workflow.input.memories_grpc_tls}
            useReflection: true
          arguments:
            method: "/llm_memory.service.ThreadService/AddMemory"
            json_body: >-
              ${ {
                thread_id: { value: $monthly_thread_id },
                memory: {
                  user_id: { value: $effective_source_user_id },
                  content: ($summary_json | tojson),
                  content_type: "TEXT",
                  role: "ROLE_ASSISTANT",
                  metadata: $monthly_metadata_json,
                  external_id: $monthly_external_id,
                  created_at: $month_start_ms,
                  updated_at: $max_source_updated_at
                }
              } | tojson }
            as_json: true

  # Step 14: Refresh ThreadData.description with the freshly written
  # overall_purpose. Reuse the thread data exported from
  # findMonthlyThread (existing path) or build it from inputs (newly
  # created path) so the previous Find→Update RPC pair collapses to
  # a single Update.
  - resolveMonthlyThreadData:
      set:
        monthly_thread_data: >-
          ${ if $existing_monthly_thread_data != null
             then $existing_monthly_thread_data
             else {
               user_id: { value: $effective_source_user_id },
               labels: $monthly_thread_labels,
               created_at: $month_start_ms,
               updated_at: $max_source_updated_at
             }
             end }

  - writeBackDescription:
      run:
        function:
          runnerName: GRPC
          using: unary
          settings:
            host: "${$workflow.input.memories_grpc_host}"
            port: ${$workflow.input.memories_grpc_port}
            tls: ${$workflow.input.memories_grpc_tls}
            useReflection: true
          arguments:
            method: "/llm_memory.service.ThreadService/Update"
            json_body: >-
              ${ {
                id: { value: $monthly_thread_id },
                data: ($monthly_thread_data
                  | .description = ($target_month_resolved
                                    + " — " + $summary_json.overall_purpose)
                  | .updatedAt = $max_source_updated_at)
              } | tojson }
            as_json: true

output:
  as:
    completed: ${ $summary_json != null }
    target_month: ${ $target_month_resolved }
    source_memory_count: ${ $target_memories | length }
    source_thread_count: >-
      ${ $target_memories | map(.threadId.value) | unique | length }
    purpose_group_count: >-
      ${ if $summary_json != null then ($summary_json.purpose_groups | length) else 0 end }
    highlight_count: >-
      ${ if $summary_json != null then ($summary_json.highlights | length) else 0 end }
    milestone_count: >-
      ${ if $summary_json != null then ($summary_json.milestones | length) else 0 end }
    skipped: ${ $skipped // false }
    skip_reason: ${ if ($skipped // false) then $result else null end }
