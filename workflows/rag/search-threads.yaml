# RAG hybrid search over thread descriptions.
#
# Same shape as search-memories.yaml but targets ThreadVectorService.
# Threads are higher-level groupings (one conversation / document each),
# so this tool is a coarse-grained discovery step. After identifying a
# relevant thread, drill in with `recall_memories` (filter by
# `thread_filter.labels`) or `expand_memory_context`.

document:
  dsl: "1.0.0-jobworkerp"
  namespace: memories
  name: rag-find-conversations
  version: "1.0.0"

input:
  schema:
    document:
      type: object
      properties:
        query:
          type: string
          description: "Natural-language search query. Embedded server-side; do NOT pass embedding vectors."
        user_id:
          # int64 as decimal string — same rationale as search-memories.yaml.
          type: string
          pattern: "^-?[0-9]+$"
          description: "Tenant user id (int64 as decimal string). Enforced as ThreadSearchFilter.user_id."
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
          description: "Maximum number of threads to return (default 10)."
        filter:
          type: object
          description: |
            Optional ThreadSearchFilter subset. `user_id` is injected
            automatically from the top-level `user_id`.
          properties:
            labels:
              type: array
              description: "Thread labels."
              items: { type: string }
            label_match_mode:
              type: string
              description: "LABEL_ANY (default) = match threads with at least one of the labels. LABEL_ALL = require every label."
            channel:
              type: string
              description: "Thread channel name."
            created_after:    { type: integer }
            created_before:   { type: integer }
            updated_after:    { type: integer }
            updated_before:   { type: integer }
        hybrid_strategy:
          type: string
          enum: [RRF, WEIGHTED, VECTOR_THEN_FTS, FTS_THEN_VECTOR]
          default: RRF
          description: "Fusion strategy."
      required: [query, user_id]

do:
  # Reference memories-mm-embedding by name (defined in
  # auto-embedding-workers.yaml). The query is short, so embed_text
  # returns a single chunk; take embeddings[0].
  - generateEmbedding:
      run:
        worker:
          name: "%{MEMORY_MM_EMBEDDING_WORKER:-memories-mm-embedding}"
          using: embed_text
          arguments:
            text: "${ .query }"
      output:
        as:
          values: "${ .embeddings[0].values }"

  - hybridSearch:
      run:
        function:
          runnerName: GRPC
          using: streaming
          settings:
            host: "%{MEMORY_GRPC_HOST}"
            port: %{MEMORY_GRPC_PORT}
            tls: false
            useReflection: true
          arguments:
            method: "/llm_memory.service.ThreadVectorService/HybridSearch"
            as_json: true
            json_body: >-
              ${ {
                query_vectors: [ { values: .values } ],
                query_text: $workflow.input.query,
                options: {
                  limit: ($workflow.input.limit // 10),
                  filter: ( ($workflow.input.filter // {})
                            + { user_id: $workflow.input.user_id } )
                },
                hybrid_options: {
                  strategy: ($workflow.input.hybrid_strategy // "RRF")
                }
              } | tojson }
      output:
        as: "${ .jsonBody | fromjson }"
