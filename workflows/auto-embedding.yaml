document:
  dsl: "1.0.0-jobworkerp"
  namespace: memories
  name: auto-embedding
  version: "1.0.0"
input:
  schema:
    document:
      type: object
      properties:
        memory_id:
          type: integer
        content:
          type: string
      required: [memory_id, content]
do:
  # Step 1: Generate text embeddings via the MultimodalEmbeddingRunner.
  # `embed_text` chunks long text and returns one Embedding per chunk
  # with character offsets (begin_position/end_position) and the chunk
  # substring (content). Every chunk is stored as its own N-row record
  # — no first-chunk-only pick, no mean collapse (image memory Phase 5).
  #
  # output.as:
  #  - model_name: from the runner's model_info so the persisted
  #    `embedding_model` always matches the model that produced the
  #    vector. `?` suppresses the "null is not iterable" jaq error when
  #    `model_info` is absent (optional in the result), and `//` then
  #    falls back to "unknown".
  #  - text_rows: one VectorRow per chunk. `to_entries[]` gives the
  #    0-based array index as `.key`, which is the contiguous
  #    chunk_index within (memory_id, vector_kind="text").
  - generateEmbedding:
      run:
        worker:
          name: "%{MEMORY_MM_EMBEDDING_WORKER:-memories-mm-embedding}"
          using: embed_text
          arguments:
            text: "${ .content }"
      output:
        as:
          model_name: "${ .model_info.model_name? // \"unknown\" }"
          text_rows: >-
            ${ [ .embeddings | to_entries[] | {
                  vector_kind: "text",
                  chunk_index: .key,
                  begin_position: .value.begin_position,
                  end_position: .value.end_position,
                  content: .value.content,
                  embedding: { values: .value.values }
                } ] }

  # Step 2: Upsert every chunk row via the BatchUpsertEmbeddings N-row
  # path. `replace_kinds: ["text"]` deletes only this memory's existing
  # `text` rows before inserting the new chunk set, so a shorter rebuild
  # leaves no stale rows and the image pipeline's image/caption rows
  # (managed by a different dispatch) are never touched (design 1/3
  # §3.3.1 kind isolation).
  #
  # The whole JSON body is built in one jq expression: object-literal
  # syntax composes values with correct typing and `tojson` serialises
  # in one pass (DSL §Runtime Expressions forbids mixing literal text
  # with ${...}; the Liquid json_encode filter is scalar-only).
  - upsertEmbedding:
      run:
        worker:
          name: memories-upsert-embedding
          using: unary
          arguments:
            json_body: >-
              ${ {
                memory_id: $workflow.input.memory_id,
                embedding_model: (.model_name // "unknown"),
                replace_kinds: ["text"],
                rows: .text_rows
              } | tojson }
